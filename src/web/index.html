        const isCurrent = dir === (window._currentProjectDir || '');
        h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:var(--radius-sm);transition:background 150ms${isCurrent?';background:var(--bg-active);border-left:3px solid var(--accent)':''}" onclick="switchWorkspace('${esc(dir)}',${w.port})" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='${isCurrent?'var(--bg-active)':''}'">
          <span style="font-size:1rem">${isCurrent ? '&#128205;' : '&#128193;'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:0.85rem;font-weight:${isCurrent?'600':'400'}${isCurrent?';color:var(--accent)':''}">${esc(name)}</div>
            <div style="font-size:0.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(dir)}">${esc(dir)}</div>
          </div>
          <span style="font-size:0.72rem;color:var(--text-muted)">${w.lastUsed ? formatDate(w.lastUsed) : ''}</span>
        </div>`;
      }
      el.innerHTML = h || `<span style="color:var(--text-muted);font-size:0.82rem">${t('settings.ws_no_user')}</span>`;
    }
  } catch {}
}

function settingDisplay(label, value, isHtml) {
  return `<div class="setting-row"><span class="setting-label">${esc(label)}</span><span class="setting-value">${isHtml ? value : esc(String(value))}</span></div>`;
}

function settingToggle(label, key, isOn, desc) {
  return `<div class="setting-row">
    <div class="setting-label">${esc(label)}${desc ? `<small>${esc(desc)}</small>` : ''}</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:0.78rem;color:var(--text-muted)">${isOn ? t('settings.on') : t('settings.off')}</span>
      <div class="toggle${isOn ? ' on' : ''}" data-key="${esc(key)}" onclick="toggleSettingValue(this)"><div class="knob"></div></div>
    </div>
  </div>`;
}

async function toggleSettingValue(el) {
  const key = el.dataset.key;
  const isOn = el.classList.contains('on');
  const newVal = !isOn;

  let payload = {};
  if (key === 'embedding_lang') {
    payload = { embedding: { language: newVal ? 'multilingual' : 'english' } };
  } else if (key === 'git_auto_commit') {
    payload = { git_sync: { auto_commit: newVal } };
  }

  const result = await api('/config', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  if (result && !result.error) {
    el.classList.toggle('on');
    const label = el.previousElementSibling;
    if (label) label.textContent = newVal ? t('settings.on') : t('settings.off');
  }
}

// ── Search Modal ──
function openSearch() {
  document.getElementById('search-overlay').classList.add('visible');
  const input = document.getElementById('search-modal-input');
  input.value = '';
  input.focus();
  document.getElementById('search-results').innerHTML = '<div class="search-hint">Type to search... (hybrid semantic + keyword)</div>';
  searchFocusIdx = -1;
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('visible');
}

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') closeSearch();
});

document.getElementById('search-modal-input').addEventListener('input', function() {
  clearTimeout(searchDebounce);
  const q = this.value.trim();
  if (!q) { document.getElementById('search-results').innerHTML = '<div class="search-hint">Type to search...</div>'; return; }
  searchDebounce = setTimeout(() => doSearch(q), 200);
});

document.getElementById('search-modal-input').addEventListener('keydown', function(e) {
  const items = document.querySelectorAll('.search-result');
  if (e.key === 'ArrowDown') { e.preventDefault(); searchFocusIdx = Math.min(searchFocusIdx + 1, items.length - 1); updateSearchFocus(items); }
  if (e.key === 'ArrowUp') { e.preventDefault(); searchFocusIdx = Math.max(searchFocusIdx - 1, 0); updateSearchFocus(items); }
  if (e.key === 'Enter' && searchFocusIdx >= 0 && items[searchFocusIdx]) { items[searchFocusIdx].click(); }
});

function updateSearchFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIdx));
  if (items[searchFocusIdx]) items[searchFocusIdx].scrollIntoView({ block: 'nearest' });
}

async function doSearch(q) {
  const results = await api('/search?q=' + encodeURIComponent(q) + '&limit=20');
  const container = document.getElementById('search-results');
  if (!results?.items?.length) { container.innerHTML = '<div class="search-hint">No results found.</div>'; return; }

  searchFocusIdx = -1;
  let html = '';
  for (const r of results.items) {
    const icon = r.type === 'knowledge_card' ? '&#128218;' : r.category === 'pitfall' ? '&#9888;' : '&#128466;';
    const title = r.title || 'Untitled';
    const snippet = (r.summary || r.content || '').replace(/\n/g, ' ').substring(0, 120);
    const score = r.score != null ? Math.round(r.score * 100) : '';

    // Determine navigation target based on item type
    let navItem;
    const isKC = (r.id && r.id.startsWith('kc_')) || r.type === 'knowledge_card'
      || ENGINEERING_CATS.includes(r.type) || PERSONAL_CATS.includes(r.type);
    if (isKC) {
      navItem = `{type:'card',id:'${esc(r.id)}'}`;
    } else {
      // Memory item — show memory detail
      navItem = `{type:'memory',id:'${esc(r.id)}'}`;
    }

    html += `<div class="search-result" onclick="closeSearch();navigate(${navItem})">
      <span class="search-result-icon">${icon}</span>
      <div class="search-result-info">
        <div class="search-result-title">${esc(title)}</div>
        <div class="search-result-snippet">${esc(snippet)}</div>
      </div>
      ${score ? `<span class="search-result-score">${score}%</span>` : ''}
    </div>`;
  }
  container.innerHTML = html;
}

// ── Stats Bar ──
function updateStatsBar() {
  document.getElementById('stat-memories').textContent = t('stats.memories_count', { n: statsData.totalMemories || 0 });
  document.getElementById('stat-cards').textContent = t('stats.cards_count', { n: statsData.totalKnowledge || 0 });
  document.getElementById('stat-skills').textContent = t('stats.skills_count', { n: sidebarData.skills.filter(s => s.status === 'active').length });
  document.getElementById('stat-tasks').textContent = t('stats.tasks_count', { n: statsData.totalTasks || 0 });
}

async function checkDaemon() {
  try {
    const resp = await fetch('/healthz');
    if (!resp.ok) throw new Error();
    const d = await resp.json();
    document.getElementById('daemon-dot').className = 'dot ok';
    document.getElementById('daemon-label').textContent = 'v' + (d.version || '?');
    if (d.project_dir) {
      window._currentProjectDir = d.project_dir;
      const name = d.project_dir.split('/').pop() || d.project_dir;
      document.getElementById('project-name-header').textContent = name;
      document.title = name + ' — Awareness Local';
    }
    const cfg = await api('/config');
    document.getElementById('stat-cloud').textContent = cfg?.cloud?.enabled ? 'Cloud: synced' : 'Cloud: local only';
  } catch {
    document.getElementById('daemon-dot').className = 'dot err';
    document.getElementById('daemon-label').textContent = 'Offline';
    document.getElementById('stat-cloud').textContent = 'Cloud: N/A';
  }
}

// ── Workspace Picker ──
let wsPickerVisible = false;
let workspacesCache = null;

function toggleWorkspacePicker() {
  wsPickerVisible = !wsPickerVisible;
  const picker = document.getElementById('ws-picker');
  if (wsPickerVisible) {
    // Position dropdown directly under the button
    const btn = document.getElementById('ws-btn');
    const rect = btn.getBoundingClientRect();
    picker.style.top = (rect.bottom + 4) + 'px';
    picker.style.left = rect.left + 'px';
    picker.style.display = 'block';
    loadWorkspacePicker();
  } else {
    picker.style.display = 'none';
  }
}

// Close picker when clicking outside
document.addEventListener('click', function(e) {
  if (wsPickerVisible && !e.target.closest('#ws-picker') && !e.target.closest('#ws-btn')) {
    wsPickerVisible = false;
    document.getElementById('ws-picker').style.display = 'none';
  }
});

async function loadWorkspacePicker() {
  const picker = document.getElementById('ws-picker');
  picker.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:0.82rem">Loading workspaces...</div>';

  const ws = await api('/workspaces');
  if (!ws || typeof ws !== 'object') {
    picker.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:0.82rem">No workspaces found.</div>';
    return;
  }

  // Filter out temp/test dirs, keep real user projects
  const entries = Object.entries(ws)
    .filter(([dir]) => {
      if (dir.startsWith('/tmp/') || dir.startsWith('/private/tmp/') || dir.startsWith('/var/')) return false;
      if (dir.includes('awareness-local-smoke') || dir.includes('awareness-local-stop') ||
          dir.includes('awareness-local-embed') || dir.includes('awareness-local-noise') ||
          dir.includes('awareness-local-focus') || dir.includes('XXXXXX')) return false;
      return true;
    })
    .sort((a, b) => (b[1].lastUsed || '').localeCompare(a[1].lastUsed || ''));

  if (entries.length === 0) {
    picker.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:0.82rem">No workspaces registered.</div>';
    return;
  }

  const currentPort = location.port;
  let html = '<div style="padding:8px 12px;font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;font-weight:600;letter-spacing:0.5px;border-bottom:1px solid var(--border)">Workspaces</div>';

  for (const [dir, w] of entries) {
    const name = w.name || dir.split('/').pop() || dir;
    const isCurrent = dir === (window._currentProjectDir || '');
    const isAccessible = w.port && w.port > 0;
    const lastUsed = w.lastUsed ? formatDate(w.lastUsed) : '';

    html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:${isAccessible?'pointer':'default'};transition:background 150ms${isCurrent?';background:var(--bg-active);border-left:3px solid var(--accent)':''}"
      ${isAccessible && !isCurrent ? `onclick="switchWorkspace('${esc(dir)}',${w.port})" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='${isCurrent?'var(--bg-active)':''}'"` : ''}>
      <div style="width:32px;height:32px;border-radius:8px;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;${isCurrent?'border:1px solid var(--accent)':''}">${name.charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:0.85rem;font-weight:${isCurrent?'600':'500'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap${isCurrent?';color:var(--accent)':''}">${esc(name)}${isCurrent?' <span style="font-size:0.7rem;color:var(--accent)">(current)</span>':''}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(dir)}">${esc(dir)}</div>
      </div>
      <div style="font-size:0.72rem;color:var(--text-muted);white-space:nowrap">${lastUsed}</div>
    </div>`;
  }

  picker.innerHTML = html;
}

async function switchWorkspace(dir, port) {
  wsPickerVisible = false;
  document.getElementById('ws-picker').style.display = 'none';

  if (port && port !== parseInt(location.port, 10)) {
    // Different daemon instance — just navigate
    window.location.href = 'http://localhost:' + port + '/';
    return;
  }

  // Same port — hot-switch via API
  const area = document.getElementById('content-area');
  if (area) area.innerHTML = '<div class="loading"><div class="spinner"></div><p>Switching workspace...</p></div>';

  const result = await api('/workspace/switch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ project_dir: dir })
  });

  if (result && result.status === 'ok') {
    // Reload ALL data for new workspace
    window._currentProjectDir = result.projectDir;
    const name = result.projectDir.split('/').pop() || result.projectDir;
    document.getElementById('project-name-header').textContent = name;
    document.title = name + ' — Awareness Local';
    selectedItem = { type: 'overview' };
    // Reset cached data so tabs reload fresh
    memoriesLoaded = false;
    await loadSidebarData();
    // If currently on data tab, reload memories too
    if (currentTopTab === 'data') loadMemories();
    if (currentTopTab === 'sync') renderSyncPanel();
    if (currentTopTab === 'settings') renderSettingsPanel();
  } else {
    if (area) area.innerHTML = '<div class="empty-state"><p>Failed to switch: ' + esc(result?.error || 'Unknown error') + '</p></div>';
  }
}

// ── Language menu ──
function toggleLangMenu() {
  const existing = document.getElementById('lang-menu');
  if (existing) { existing.remove(); return; }
  const btn = document.getElementById('lang-toggle');
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.id = 'lang-menu';
  menu.style.cssText = `position:fixed;top:${rect.bottom + 4}px;left:${rect.left}px;z-index:100;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(0,0,0,0.4);min-width:140px;overflow:hidden`;
  const languages = [
    { code: 'en', label: 'English', flag: '🇬🇧' },
    { code: 'zh', label: '中文', flag: '🇨🇳' },
  ];
  for (const lang of languages) {
    const isActive = currentLocale === lang.code;
    const item = document.createElement('div');
    item.style.cssText = `display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:0.85rem;${isActive ? 'background:var(--bg-active);color:var(--accent)' : ''}`;
    item.innerHTML = `<span style="font-size:1rem">${lang.flag}</span><span style="flex:1">${lang.label}</span>${isActive ? '<span>&#10003;</span>' : ''}`;
    item.onmouseover = () => { if (!isActive) item.style.background = 'var(--bg-hover)'; };
    item.onmouseout = () => { if (!isActive) item.style.background = ''; };
    item.onclick = () => {
      setLocale(lang.code);
      document.getElementById('lang-menu')?.remove();
    };
    menu.appendChild(item);
  }
  document.body.appendChild(menu);
  // Close on outside click
  setTimeout(() => {
    const handler = (e) => {
      if (!e.target.closest('#lang-menu') && !e.target.closest('#lang-toggle')) {
        menu.remove();
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('click', handler);
  }, 10);
}

// Update header lang label
function updateLangLabel() {
  const el = document.getElementById('lang-label');
  if (el) el.textContent = currentLocale.toUpperCase();
}

// ── Init ──
async function init() {
  applyStaticI18n();
  updateLangLabel();
  await Promise.all([checkDaemon(), loadSidebarData()]);
  setInterval(() => { checkDaemon(); }, 30000);
}
init();
</script>
