<title>Awareness Local</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='64' height='64' viewBox='0 0 512 512' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='os' x1='30' y1='50' x2='490' y2='500' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23E0F2FE'/%3E%3Cstop offset='.35' stop-color='%237DD3FC'/%3E%3Cstop offset='.7' stop-color='%2338BDF8'/%3E%3Cstop offset='1' stop-color='%230EA5E9'/%3E%3C/linearGradient%3E%3ClinearGradient id='is' x1='120' y1='80' x2='300' y2='260' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23F0F9FF'/%3E%3Cstop offset='.4' stop-color='%23BAE6FD'/%3E%3Cstop offset='1' stop-color='%2338BDF8'/%3E%3C/linearGradient%3E%3CradialGradient id='df' cx='200' cy='168' r='20' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23F0F9FF'/%3E%3Cstop offset='.5' stop-color='%237DD3FC'/%3E%3Cstop offset='1' stop-color='%230EA5E9'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='262' cy='275' r='218' stroke='url(%23os)' stroke-width='18' fill='none'/%3E%3Ccircle cx='198' cy='168' r='68' stroke='url(%23is)' stroke-width='15' fill='none'/%3E%3Ccircle cx='198' cy='168' r='17' fill='url(%23df)'/%3E%3C/svg%3E">
<style>
/* ======================================================================
   Awareness Local — Wiki Dashboard
   Single-file SPA, zero external dependencies
   Aligned with cloud frontend Wiki/Insights architecture
   ====================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #121212;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #242424;
  --bg-hover: #292929;
  --bg-active: #1e293b;
  --border: #2e2e2e;
  --border-active: #3b82f6;
  --text-primary: #ebebeb;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-glow: #0ea5e9;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --yellow: #eab308;
  --yellow-bg: rgba(234,179,8,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --orange: #f97316;
  --orange-bg: rgba(249,115,22,0.12);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.12);
  --cyan: #06b6d4;
  --cyan-bg: rgba(6,182,212,0.12);
  --sidebar-w: 280px;
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 150ms ease;
}
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-primary); color: var(--text-primary); line-height: 1.6;
  min-height: 100vh; overflow: hidden;
}

/* ── Layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-secondary); flex-shrink: 0; z-index: 20;
}
.header h1 { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.header .logo-svg { width: 26px; height: 26px; flex-shrink: 0; }
.header-right { display: flex; align-items: center; gap: 10px; }
.daemon-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.78rem; color: var(--text-secondary); background: var(--bg-tertiary);
  padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border);
}
.daemon-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
.daemon-badge .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.daemon-badge .dot.err { background: var(--red); }

/* ── Top Tabs ── */
.top-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  background: var(--bg-secondary); padding: 0 20px; flex-shrink: 0;
}
.top-tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-secondary); font-size: 0.85rem; padding: 10px 14px;
  cursor: pointer; white-space: nowrap; transition: color var(--transition), border-color var(--transition);
}
.top-tab:hover { color: var(--text-primary); }
.top-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.top-tab .badge-count {
  font-size: 0.7rem; background: var(--bg-tertiary); color: var(--text-muted);
  padding: 1px 6px; border-radius: 999px; margin-left: 6px; border: 1px solid var(--border);
}

/* ── Main body ── */
.body { flex: 1; display: flex; overflow: hidden; }

/* ── Top-level tab panels ── */
.top-panel { display: none; flex: 1; overflow: hidden; }
.top-panel.active { display: flex; }

/* ── Wiki panel (sidebar + content) ── */
.wiki-panel { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); border-right: 1px solid var(--border);
  background: var(--bg-secondary); display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-search {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 10px; color: var(--text-primary);
  font-size: 0.82rem; outline: none;
}
.sidebar-search input::placeholder { color: var(--text-muted); }
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-scroll { flex: 1; overflow-y: auto; padding-bottom: 12px; }

/* Sidebar groups */
.sb-group { border-bottom: 1px solid var(--border); }
.sb-group-header {
  display: flex; align-items: center; padding: 8px 14px; cursor: pointer;
  user-select: none; transition: background var(--transition);
}
.sb-group-header:hover { background: var(--bg-hover); }
.sb-group-icon { width: 18px; font-size: 0.9rem; margin-right: 8px; text-align: center; flex-shrink: 0; }
.sb-group-label { flex: 1; font-size: 0.82rem; font-weight: 500; }
.sb-group-count {
  font-size: 0.7rem; color: var(--text-muted); background: var(--bg-tertiary);
  padding: 1px 6px; border-radius: 999px; margin-right: 6px;
}
.sb-group-chevron { font-size: 0.7rem; color: var(--text-muted); transition: transform var(--transition); }
.sb-group.collapsed .sb-group-chevron { transform: rotate(-90deg); }
.sb-group-items { padding: 0; }
.sb-group.collapsed .sb-group-items { display: none; }

/* Sidebar items */
.sb-item {
  display: flex; align-items: center; padding: 5px 14px 5px 40px;
  cursor: pointer; font-size: 0.8rem; color: var(--text-secondary);
  transition: background var(--transition), color var(--transition);
  border-left: 2px solid transparent;
}
.sb-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.sb-item.active { background: var(--bg-active); color: var(--accent); border-left-color: var(--accent); }
.sb-item-dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
.sb-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-item-badge {
  font-size: 0.68rem; color: var(--text-muted); margin-left: 6px;
}

/* Top-level sidebar entries (bold) */
.sb-top-item {
  display: flex; align-items: center; padding: 8px 14px; cursor: pointer;
  font-size: 0.82rem; font-weight: 600; color: var(--text-primary);
  transition: background var(--transition); border-left: 2px solid transparent;
}
.sb-top-item:hover { background: var(--bg-hover); }
.sb-top-item.active { background: var(--bg-active); color: var(--accent); border-left-color: var(--accent); }
.sb-top-item .sb-group-icon { margin-right: 8px; }
.sb-top-item .sb-group-count { margin-left: auto; }

/* ── Content Area ── */
.content-area { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Shared UI ── */
.badge {
  display: inline-block; font-size: 0.72rem; padding: 2px 8px;
  border-radius: 999px; font-weight: 500; white-space: nowrap;
}
.badge-cat { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
.badge-decision { background: var(--accent); color: #fff; }
.badge-problem_solution { background: var(--green); color: #fff; }
.badge-workflow { background: var(--blue); color: #fff; }
.badge-key_point { background: var(--yellow); color: #000; }
.badge-pitfall { background: var(--red); color: #fff; }
.badge-insight { background: var(--orange); color: #fff; }
.badge-personal_preference { background: var(--purple); color: #fff; }
.badge-important_detail { background: var(--cyan); color: #fff; }
.badge-tag { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
.badge-confidence { border: 1px solid var(--border); color: var(--text-secondary); }
.badge-confidence.high { border-color: var(--green); color: var(--green); }
.badge-confidence.mid { border-color: var(--yellow); color: var(--yellow); }
.badge-confidence.low { border-color: var(--red); color: var(--red); }
.badge-growth { font-size: 0.72rem; padding: 2px 8px; border-radius: 999px; }
.badge-evergreen { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
.badge-budding { background: rgba(234,179,8,0.12); color: #fbbf24; border: 1px solid rgba(234,179,8,0.25); }
.badge-seedling { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }

.btn {
  background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 8px 16px; font-size: 0.82rem; cursor: pointer; font-weight: 500;
  transition: background var(--transition);
}
.btn:hover { background: var(--accent-hover); }
.btn-ghost {
  background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px 12px; font-size: 0.82rem; cursor: pointer;
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-sm { padding: 4px 10px; font-size: 0.76rem; }

.card-box {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; transition: border-color var(--transition);
}
.card-box:hover { border-color: var(--border-active); }
.card-box-clickable { cursor: pointer; }

.grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

.section-title { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.section-gap { margin-bottom: 28px; }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
.spinner {
  display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Stats header (overview) ── */
.stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 120px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; text-align: center;
}
.stat-card .num { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); }
.stat-card .label { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

/* ── Card detail view ── */
.card-detail { display: flex; gap: 24px; }
.card-detail-main { flex: 1; min-width: 0; }
.card-detail-sidebar { width: 260px; flex-shrink: 0; }
.card-detail-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
.card-detail-body { font-size: 0.9rem; line-height: 1.7; color: var(--text-secondary); word-break: break-word; }
.card-detail-body pre { margin: 8px 0; }
.card-detail-body code { font-family: "SF Mono", Monaco, "Cascadia Code", monospace; }
.card-detail-body a { color: var(--accent); }
.card-detail-body h1,.card-detail-body h2,.card-detail-body h3 { color: var(--text-primary); }
.meta-table { width: 100%; font-size: 0.82rem; }
.meta-table td { padding: 6px 0; vertical-align: top; }
.meta-table td:first-child { color: var(--text-muted); width: 100px; }

/* ── Skill card ── */
.skill-card { position: relative; }
.skill-card-name { font-weight: 600; font-size: 0.92rem; margin-bottom: 4px; }
.skill-card-summary { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; }
.skill-decay-bar { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.skill-decay-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.skill-meta { display: flex; gap: 8px; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; }
.skill-pin { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 0.9rem; opacity: 0.5; }
.skill-pin:hover { opacity: 1; }
.skill-pin.pinned { opacity: 1; color: var(--yellow); }

/* ── Timeline ── */
.tl-day { margin-bottom: 20px; }
.tl-day-header { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.tl-event { display: flex; gap: 10px; padding: 6px 0; font-size: 0.82rem; }
.tl-event-time { color: var(--text-muted); width: 60px; flex-shrink: 0; }
.tl-event-content { flex: 1; color: var(--text-secondary); }
.tl-event-type { font-size: 0.72rem; }

/* ── Search modal ── */
.search-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 12vh; }
.search-overlay.visible { display: flex; }
.search-modal {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius);
  width: 560px; max-width: 90vw; max-height: 70vh; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.search-modal-input {
  width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
  padding: 14px 16px; color: var(--text-primary); font-size: 0.95rem; outline: none;
}
.search-modal-input::placeholder { color: var(--text-muted); }
.search-results { flex: 1; overflow-y: auto; }
.search-result {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  cursor: pointer; transition: background var(--transition);
}
.search-result:hover, .search-result.focused { background: var(--bg-hover); }
.search-result-icon { font-size: 0.9rem; width: 24px; text-align: center; flex-shrink: 0; }
.search-result-info { flex: 1; min-width: 0; }
.search-result-title { font-size: 0.85rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-snippet { font-size: 0.76rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-score { font-size: 0.7rem; color: var(--text-muted); }
.search-hint { padding: 12px 16px; font-size: 0.78rem; color: var(--text-muted); text-align: center; }

/* ── Sync / Settings panels (non-wiki) ── */
.simple-panel { flex: 1; overflow-y: auto; padding: 24px; max-width: 800px; margin: 0 auto; }
.sync-status-box {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px;
}
.sync-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.sync-icon.connected { background: var(--green-bg); }
.sync-icon.disconnected { background: var(--bg-tertiary); }
.sync-info h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 3px; }
.sync-info p { font-size: 0.82rem; color: var(--text-secondary); }
.connect-instructions { display: none; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 16px; }
.connect-instructions.visible { display: block; }
.sync-history { margin-top: 20px; }
.sync-history h4 { font-size: 0.88rem; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary); }
.sync-history-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.sync-history-item:last-child { border-bottom: none; }

.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 0.92rem; font-weight: 600; margin-bottom: 12px; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 0.85rem; }
.setting-label small { display: block; color: var(--text-muted); font-size: 0.76rem; margin-top: 2px; }
.setting-value { font-size: 0.82rem; color: var(--text-secondary); font-family: "SF Mono", Monaco, monospace; }
.toggle { width: 40px; height: 22px; border-radius: 11px; background: var(--bg-tertiary); border: 1px solid var(--border); position: relative; cursor: pointer; transition: background var(--transition); }
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle .knob { width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: left var(--transition); }
.toggle.on .knob { left: 20px; }

/* Breadcrumb */
.breadcrumb { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; font-size: 0.82rem; }
.breadcrumb a { color: var(--accent); cursor: pointer; text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--text-muted); }

/* ── Stats bar (footer) ── */
.stats-bar {
  display: flex; align-items: center; gap: 14px; padding: 8px 20px;
  background: var(--bg-secondary); border-top: 1px solid var(--border);
  font-size: 0.76rem; color: var(--text-muted); flex-shrink: 0;
}
.stats-bar .stat { display: flex; align-items: center; gap: 4px; }
.stats-bar .sep { color: var(--border); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .card-detail { flex-direction: column; }
  .card-detail-sidebar { width: 100%; }
  .stats-row { flex-direction: column; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* Priority dots */
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.priority-dot.high { background: var(--red); box-shadow: 0 0 4px var(--red); }
.priority-dot.medium { background: var(--yellow); }
.priority-dot.low { background: var(--green); }

/* Risk level */
.risk-level { font-size: 0.72rem; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.risk-level.high { background: var(--red-bg); color: var(--red); }
.risk-level.medium { background: var(--yellow-bg); color: var(--yellow); }
.risk-level.low { background: var(--green-bg); color: var(--green); }

/* Task status select */
.task-status-select {
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 8px; font-size: 0.78rem; cursor: pointer; outline: none;
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <h1>
      <svg class="logo-svg" width="26" height="26" viewBox="0 0 512 512" fill="none"><defs><linearGradient id="os" x1="30" y1="50" x2="490" y2="500" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#E0F2FE"/><stop offset=".35" stop-color="#7DD3FC"/><stop offset=".7" stop-color="#38BDF8"/><stop offset="1" stop-color="#0EA5E9"/></linearGradient><linearGradient id="is" x1="120" y1="80" x2="300" y2="260" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#F0F9FF"/><stop offset=".4" stop-color="#BAE6FD"/><stop offset="1" stop-color="#38BDF8"/></linearGradient><radialGradient id="df" cx="200" cy="168" r="20" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#F0F9FF"/><stop offset=".5" stop-color="#7DD3FC"/><stop offset="1" stop-color="#0EA5E9"/></radialGradient></defs><circle cx="262" cy="275" r="218" stroke="url(#os)" stroke-width="16" fill="none"/><circle cx="198" cy="168" r="68" stroke="url(#is)" stroke-width="13" fill="none"/><circle cx="198" cy="168" r="15" fill="url(#df)"/></svg>
      <span style="font-size:0.88rem">Awareness</span>

  if (nav.startsWith('zh')) return 'zh';
  return 'en';
})();

/** Translate a key with variable interpolation. Falls back to English then to key itself. */
function t(key, vars) {
  let str = LOCALES[currentLocale]?.[key] ?? LOCALES.en[key] ?? key;
  if (vars) {
    for (const [k, v] of Object.entries(vars)) {
      str = str.replace(new RegExp(`\\{${k}\\}`, 'g'), String(v));
    }
  }
  return str;
}

function setLocale(loc) {
  if (!LOCALES[loc]) return;
  currentLocale = loc;
  try { localStorage.setItem('awareness_locale', loc); } catch {}
  // Re-apply static labels + re-render current view
  applyStaticI18n();
  if (typeof updateLangLabel === 'function') updateLangLabel();
  renderSidebar(document.getElementById('sidebar-filter')?.value || '');
  navigate(selectedItem);
  if (currentTopTab === 'sync') renderSyncPanel();
  if (currentTopTab === 'settings') renderSettingsPanel();
  if (currentTopTab === 'data') loadMemories();
}

function applyStaticI18n() {

// ── Helpers ──
async function api(path, options) {
  try { const r = await fetch(API + path, options); if (!r.ok) throw new Error('HTTP ' + r.status); return await r.json(); } catch (e) { console.error('[api]', path, e); return null; }
}
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/** Lightweight Markdown→HTML renderer. Zero dependencies.
 *  Supports: headings, bold, italic, inline code, code blocks, links, lists, hr, blockquotes, paragraphs. */
function renderMd(raw) {
  if (!raw) return '';
  const s = raw.replace(/\r\n/g, '\n');
  let html = '';
  let inCodeBlock = false;
  let codeBlockContent = '';
  let inList = false;
  let listType = '';

  const lines = s.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Code block toggle
    if (line.trimStart().startsWith('```')) {
      if (inCodeBlock) {
        html += '<pre style="background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;overflow-x:auto;font-size:0.82rem;line-height:1.5;margin:8px 0"><code>' + esc(codeBlockContent.trimEnd()) + '</code></pre>';
        codeBlockContent = '';
        inCodeBlock = false;
      } else {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        inCodeBlock = true;
      }
      continue;
    }
    if (inCodeBlock) { codeBlockContent += line + '\n'; continue; }

    // Close list if line doesn't continue it
    if (inList && !/^\s*[-*+]\s|^\s*\d+\.\s/.test(line) && line.trim() !== '') {
      html += listType === 'ul' ? '</ul>' : '</ol>';
      inList = false;
    }

    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
    if (hMatch) { const lvl = hMatch[1].length; html += `<h${lvl} style="font-size:${1.2 - lvl * 0.08}rem;font-weight:600;margin:12px 0 6px">${inlineMd(hMatch[2])}</h${lvl}>`; continue; }

    // HR
    if (/^[-*_]{3,}\s*$/.test(line)) { html += '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">'; continue; }

    // Blockquote
    if (line.startsWith('>')) { html += `<blockquote style="border-left:3px solid var(--border);padding-left:12px;color:var(--text-secondary);margin:6px 0">${inlineMd(line.replace(/^>\s?/, ''))}</blockquote>`; continue; }

    // Unordered list
    const ulMatch = line.match(/^\s*[-*+]\s+(.*)/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') { if (inList) html += '</ol>'; html += '<ul style="margin:6px 0;padding-left:20px">'; inList = true; listType = 'ul'; }
      html += `<li style="margin:2px 0">${inlineMd(ulMatch[1])}</li>`;
      continue;
    }

    // Ordered list
    const olMatch = line.match(/^\s*\d+\.\s+(.*)/);
    if (olMatch) {
      if (!inList || listType !== 'ol') { if (inList) html += '</ul>'; html += '<ol style="margin:6px 0;padding-left:20px">'; inList = true; listType = 'ol'; }
      html += `<li style="margin:2px 0">${inlineMd(olMatch[1])}</li>`;
      continue;
    }

    // Empty line = paragraph break
    if (line.trim() === '') { html += '<div style="height:8px"></div>'; continue; }

    // Regular paragraph
    html += `<p style="margin:4px 0;line-height:1.65">${inlineMd(line)}</p>`;
  }

  if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
  if (inCodeBlock) html += '<pre style="background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;overflow-x:auto;font-size:0.82rem"><code>' + esc(codeBlockContent) + '</code></pre>';
  return html;
}

/** Inline markdown: bold, italic, code, links */
function inlineMd(text) {
  let s = esc(text);
  s = s.replace(/`([^`]+)`/g, '<code style="background:var(--bg-primary);padding:1px 5px;border-radius:3px;font-size:0.85em">$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  return s;
}
function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso), now = new Date(), ms = now - d;
    const min = Math.floor(ms/60000), hr = Math.floor(ms/3600000), day = Math.floor(ms/86400000);
    if (min < 1) return 'just now'; if (min < 60) return min + 'm ago';
    if (hr < 24) return hr + 'h ago'; if (day < 7) return day + 'd ago';
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  } catch { return iso; }
}
function parseTags(t) { if (Array.isArray(t)) return t; if (typeof t === 'string') { try { const p = JSON.parse(t); if (Array.isArray(p)) return p; } catch {} } return []; }
function catLabel(c) { return (c || 'other').replace(/_/g, ' ').replace(/\b\w/g, x => x.toUpperCase()); }
function confClass(c) { return c >= 0.8 ? 'high' : c >= 0.5 ? 'mid' : 'low'; }
function growthBadge(g) { const cls = g || 'seedling'; return `<span class="badge-growth badge-${cls}">${GROWTH_EMOJI[cls] || ''} ${catLabel(cls)}</span>`; }
function catBadge(cat) { return `<span class="badge badge-${esc(cat)}" style="background:${CAT_COLORS[cat]||'var(--bg-tertiary)'};color:${CAT_COLORS[cat]?'#fff':'var(--text-secondary)'}">${esc(catLabel(cat))}</span>`; }

document.getElementById('top-tabs').addEventListener('click', function(e) {

// ── Sidebar rendering ──
async function loadSidebarData() {
  const [topicsRes, skillsRes, tasksRes, knowledgeRes, timelineRes, statsRes, perceptionsRes] = await Promise.all([
    api('/topics'), api('/skills'), api('/tasks'), api('/knowledge?limit=500'), api('/timeline?days=14'), api('/stats'),
    api('/perceptions?state=active,snoozed&limit=50')
  ]);
  sidebarData.topics = topicsRes?.items || [];
  sidebarData.skills = skillsRes?.items || [];
  sidebarData.tasks = (tasksRes?.items || []).filter(t => t.status !== 'done');
  sidebarData.knowledgeCards = knowledgeRes?.items || [];
  sidebarData.risks = sidebarData.knowledgeCards.filter(c => c.category === 'pitfall' || c.category === 'risk');
  sidebarData.timeline = timelineRes?.by_day || [];
  sidebarData.perceptions = perceptionsRes?.items || [];
  sidebarData.perceptionCounts = perceptionsRes?.counts || {};

function renderSidebar(filter = '') {
  // Save current collapsed state from DOM before re-render

  html += `<div class="sb-top-item${selectedItem.type==='overview'?' active':''}" onclick="navigate({type:'overview'})">
    <span class="sb-group-icon">&#127968;</span> ${t('sidebar.overview')}

  // Awareness / Perception Center (top-level)
  const activePerceptions = sidebarData.perceptions.filter(p => p.state === 'active' && p.exposure_count < 3);

  html += sidebarGroup('topics', '&#128218;', t('sidebar.topics'), topics.length, sidebarCollapsed.topics ?? false,
    topics.map(topic => sidebarItem('topic', topic.id, topic.title, topic.card_count, 'var(--accent)')).join(''));

  // Engineering Cards
  const engCards = sidebarData.knowledgeCards.filter(c => ENGINEERING_CATS.includes(c.category) && (!f || (c.title||'').toLowerCase().includes(f)));
  html += sidebarGroup('eng', '&#9881;', t('sidebar.eng_cards'), engCards.length, sidebarCollapsed.eng ?? true,
    groupCardsByCategory(engCards, f));

  // Personal Cards
  const persCards = sidebarData.knowledgeCards.filter(c => PERSONAL_CATS.includes(c.category) && (!f || (c.title||'').toLowerCase().includes(f)));
  html += sidebarGroup('pers', '&#128100;', t('sidebar.pers_cards'), persCards.length, sidebarCollapsed.pers ?? true,
    groupCardsByCategory(persCards, f));

  // Skills (top-level)
  const activeSkills = sidebarData.skills.filter(s => s.status === 'active');
  html += `<div class="sb-top-item${selectedItem.type==='skills'?' active':''}" onclick="navigate({type:'skills'})">
    <span class="sb-group-icon">&#9889;</span> ${t('sidebar.skills')}
    <span class="sb-group-count">${activeSkills.length}</span>
  </div>`;

  // Tasks group
  const tasksFiltered = sidebarData.tasks.filter(task => !f || (task.title||'').toLowerCase().includes(f)).slice(0, 15);
  html += sidebarGroup('tasks', '&#9745;', t('sidebar.tasks'), sidebarData.tasks.length, sidebarCollapsed.tasks ?? false,
    tasksFiltered.map(task => {
      const pColor = task.priority === 'high' ? 'var(--red)' : task.priority === 'medium' ? 'var(--yellow)' : 'var(--green)';
      return sidebarItem('task', task.id, task.title || t('common.untitled'), null, pColor);
    }).join(''));

  // Risks group
  const risks = sidebarData.risks.filter(r => !f || (r.title||'').toLowerCase().includes(f)).slice(0, 10);
  html += sidebarGroup('risks', '&#9888;', t('sidebar.risks'), sidebarData.risks.length, sidebarCollapsed.risks ?? true,
    risks.map(r => sidebarItem('risk', r.id, r.title || t('common.untitled'), null, 'var(--red)')).join(''));

  // Timeline group
  const tl = sidebarData.timeline.filter(d => !f || d.date.includes(f)).slice(0, 14);
  html += sidebarGroup('timeline', '&#128197;', t('sidebar.timeline'), sidebarData.timeline.length, sidebarCollapsed.timeline ?? true,
    tl.map(d => sidebarItem('timeline_day', d.date, d.date, d.count)).join(''));

  document.getElementById('sidebar-scroll').innerHTML = html;

function sidebarGroup(id, icon, label, count, collapsed, itemsHtml) {
  const cls = collapsed ? ' collapsed' : '';
  return `<div class="sb-group${cls}" id="sb-grp-${id}">
    <div class="sb-group-header" onclick="this.parentElement.classList.toggle('collapsed');sidebarCollapsed['${id}']=this.parentElement.classList.contains('collapsed')">

      <span class="sb-group-chevron">&#9660;</span>

    <div class="sb-group-items">${itemsHtml || '<div style="padding:6px 14px 6px 40px;font-size:0.78rem;color:var(--text-muted)">None</div>'}</div>
  </div>`;
}

function sidebarItem(type, id, label, badge, dotColor) {
  const active = selectedItem.type === type && (selectedItem.id === id || selectedItem.date === id) ? ' active' : '';
  const dot = dotColor ? `<span class="sb-item-dot" style="background:${dotColor}"></span>` : '';
  const bdg = badge != null ? `<span class="sb-item-badge">${badge}</span>` : '';
  const clickData = type === 'timeline_day' ? `{type:'${type}',date:'${esc(id)}'}` : `{type:'${type}',id:'${esc(id)}'}`;
  return `<div class="sb-item${active}" onclick="navigate(${clickData})">${dot}<span class="sb-item-label">${esc(label)}</span>${bdg}</div>`;
}

function groupCardsByCategory(cards, filter) {
  const groups = {};
  for (const c of cards) {
    const cat = c.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(c);
  }
  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    // Sort: evergreen first
    items.sort((a, b) => {
      const order = { evergreen: 0, budding: 1, seedling: 2 };
      return (order[a.growth_stage] ?? 2) - (order[b.growth_stage] ?? 2);
    });
    html += `<div style="padding:2px 0 2px 28px;font-size:0.74rem;color:var(--text-muted);font-weight:600;margin-top:4px">${esc(catLabel(cat))} (${items.length})</div>`;
    for (const c of items.slice(0, 20)) {
      const gEmoji = c.growth_stage === 'evergreen' ? '&#127795;' : c.growth_stage === 'budding' ? '&#127807;' : '';
      html += sidebarItem('card', c.id, (gEmoji ? gEmoji + ' ' : '') + (c.title || 'Untitled'), null, CAT_COLORS[cat]);
    }
  }
  return html;
}

function filterSidebar(val) { renderSidebar(val); }

// ── Navigation / Content Routing ──
function navigate(item) {
  selectedItem = item;
  renderSidebar(document.getElementById('sidebar-filter')?.value || '');
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  switch (item.type) {
    case 'overview': renderOverview(area); break;
    case 'topic': renderTopicDetail(area, item.id); break;
    case 'card': renderCardDetail(area, item.id); break;
    case 'task': renderTaskDetail(area, item.id); break;
    case 'risk': renderRiskDetail(area, item.id); break;
    case 'timeline_day': renderTimelineDay(area, item.date); break;
    case 'skills': renderSkillsView(area); break;
    case 'memory': renderMemoryDetail(area, item.id); break;
    case 'perceptions': renderPerceptionCenter(area); break;
    default: area.innerHTML = '<div class="empty-state"><p>Select an item from the sidebar.</p></div>';
  }
}

function statCard(num, label) {
  return `<div class="stat-card"><div class="num">${num}</div><div class="label">${esc(label)}</div></div>`;
}

function renderKCCard(c) {
  const tags = parseTags(c.tags).slice(0, 3).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('');
  const conf = c.confidence != null ? c.confidence : 0.8;
  return `<div class="card-box card-box-clickable" onclick="navigate({type:'card',id:'${esc(c.id)}'})" style="border-left:3px solid ${CAT_COLORS[c.category]||'var(--border)'}">
    <div style="font-weight:600;font-size:0.88rem;margin-bottom:4px">${esc(c.title || 'Untitled')}</div>
    <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(c.summary || '')}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${catBadge(c.category)} ${growthBadge(c.growth_stage)}
      <span class="badge badge-confidence ${confClass(conf)}">${Math.round(conf*100)}%</span>
      ${tags}
    </div>
  </div>`;

// ── Topic Detail ──
function renderTopicDetail(area, topicId) {
  const topic = sidebarData.topics.find(t => t.id === topicId);
  if (!topic) { area.innerHTML = '<div class="empty-state"><p>Topic not found.</p></div>'; return; }

  let cards;
  if (topic.source === 'moc') {
    // MOC card — show it as a card detail (it IS a knowledge card)
    renderCardDetail(area, topicId);
    return;
  } else if (topic.source === 'tag') {
    // Tag-based topic — find cards that have this tag
    const tagName = topicId.replace('tag_', '').toLowerCase();
    cards = sidebarData.knowledgeCards.filter(c => {
      const tags = parseTags(c.tags).map(t => t.toLowerCase());
      return tags.includes(tagName);
    });
  } else {
    cards = [];
  }

  cards.sort((a, b) => {
    const go = { evergreen: 0, budding: 1, seedling: 2 };
    return (go[a.growth_stage] ?? 2) - (go[b.growth_stage] ?? 2);
  });

  let html = breadcrumb([{ label: 'Overview', item: { type: 'overview' } }, { label: topic.title }]);
  html += `<h2 style="font-size:1.2rem;margin-bottom:4px">${esc(topic.title)}</h2>`;
  if (topic.summary) {
    html += `<div style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:12px">${esc(topic.summary)}</div>`;
  }
  html += `<div style="color:var(--text-muted);font-size:0.82rem;margin-bottom:20px">${cards.length} cards${topic.last_updated_at ? ' &middot; Last updated ' + formatDate(topic.last_updated_at) : ''}</div>`;

  if (cards.length === 0) {
    html += '<div class="empty-state"><p>No cards found for this topic.</p></div>';
  } else {
    html += '<div class="grid-2">';
    for (const c of cards) { html += renderKCCard(c); }
    html += '</div>';
  }

  area.innerHTML = html;
}

// ── Card Detail ──
async function renderCardDetail(area, cardId) {
  const data = await api('/knowledge/' + encodeURIComponent(cardId));
  if (!data || data.error) { area.innerHTML = '<div class="empty-state"><p>Card not found.</p></div>'; return; }

  const c = data;
  const tags = parseTags(c.tags);
  const conf = c.confidence != null ? c.confidence : 0.8;
  const catTitle = catLabel(c.category || 'other');

  let html = breadcrumb([{ label: 'Overview', item: { type: 'overview' } }, { label: catTitle, item: { type: 'topic', id: 'topic_' + c.category } }, { label: c.title || 'Untitled' }]);

  html += '<div class="card-detail">';

  // Main content
  html += '<div class="card-detail-main">';
  html += `<div class="card-detail-title">${esc(c.title || 'Untitled')}</div>`;
  html += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">${catBadge(c.category)} ${growthBadge(c.growth_stage)} <span class="badge badge-confidence ${confClass(conf)}">${Math.round(conf*100)}%</span></div>`;
  html += `<div class="card-detail-body">${renderMd(c.summary || 'No content.')}</div>`;

  // Evolution chain
  if (c.evolution_chain && c.evolution_chain.length > 1) {
    html += '<div style="margin-top:24px"><div class="section-title">Evolution Chain</div>';
    for (const e of c.evolution_chain) {
      const isCurrent = e.id === cardId;
      html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;${isCurrent?'font-weight:600;color:var(--accent)':'color:var(--text-secondary)'}">
        <span style="font-size:0.75rem">${isCurrent ? '&#9658;' : '&#9679;'}</span>
        <span style="font-size:0.82rem;cursor:pointer;text-decoration:${isCurrent?'none':'underline'}" onclick="${isCurrent?'':`navigate({type:'card',id:'${esc(e.id)}'})`}">${esc(e.title || e.id)}</span>
        <span style="font-size:0.72rem;color:var(--text-muted)">${formatDate(e.created_at)}</span>
      </div>`;
    }
    html += '</div>';
  }

  // Tags
  if (tags.length > 0) {
    html += `<div style="margin-top:20px;display:flex;gap:6px;flex-wrap:wrap">${tags.map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('')}</div>`;
  }
  html += '</div>';

  // Sidebar
  html += '<div class="card-detail-sidebar">';
  html += '<div class="card-box" style="margin-bottom:12px"><div class="section-title" style="margin-bottom:8px">Metadata</div>';
  html += '<table class="meta-table">';
  html += metaRow('Category', catTitle);
  html += metaRow('Growth', (GROWTH_EMOJI[c.growth_stage]||'') + ' ' + catLabel(c.growth_stage || 'seedling'));
  html += metaRow('Confidence', Math.round(conf * 100) + '%');
  html += metaRow('Created', formatDate(c.created_at));
  if (c.last_touched_at) html += metaRow('Last Touched', formatDate(c.last_touched_at));
  if (c.link_count_incoming > 0) html += metaRow('Inbound Links', c.link_count_incoming);
  if (c.link_count_outgoing > 0) html += metaRow('Outbound Links', c.link_count_outgoing);
  if (c.evolution_type && c.evolution_type !== 'initial') html += metaRow('Evolution', catLabel(c.evolution_type));
  html += '</table></div>';

  // Related cards
  if (c.related_cards && c.related_cards.length > 0) {
    html += '<div class="card-box"><div class="section-title" style="margin-bottom:8px">Related Cards</div>';
    for (const r of c.related_cards) {
      html += `<div style="padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate({type:'card',id:'${esc(r.id)}'})">
        <div style="font-size:0.82rem;font-weight:500;color:var(--accent)">${esc(r.title || 'Untitled')}</div>
        <div style="font-size:0.72rem;color:var(--text-muted)">${growthBadge(r.growth_stage)} ${formatDate(r.created_at)}</div>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div></div>';

  area.innerHTML = html;
}

function metaRow(label, value) {
  return `<tr><td>${esc(label)}</td><td>${value}</td></tr>`;
}

function breadcrumb(items) {
  let html = '<div class="breadcrumb">';
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (i > 0) html += '<span class="sep">/</span>';
    if (item.item) {
      html += `<a onclick="navigate(${JSON.stringify(item.item).replace(/"/g, '&quot;')})">${esc(item.label)}</a>`;
    } else {
      html += `<span style="color:var(--text-primary)">${esc(item.label)}</span>`;
    }
  }
  html += '</div>';
  return html;
}

// ── Perception Center ──
let perceptionFilter = 'active';

async function renderPerceptionCenter(area) {
  area.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await api(`/perceptions?state=${perceptionFilter}&limit=200`);
  if (!data) { area.innerHTML = '<div class="empty-state"><p>Failed to load perceptions.</p></div>'; return; }

  const items = data.items || [];
  const counts = data.counts || {};

  let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
    <h2 style="font-size:1.2rem;font-weight:700">&#128065; ${t('perception.title')}</h2>
    <button class="btn-ghost btn-sm" onclick="refreshPerceptions()">&#8635; ${t('perception.cleanup')}</button>
  </div>`;
  html += `<div style="color:var(--text-muted);font-size:0.82rem;margin-bottom:16px">
    ${t('perception.subtitle')}
  </div>`;

  // Filter tabs
  const tabs = [
    { key: 'active,snoozed', label: t('perception.filter.active'), count: (counts.active || 0) + (counts.snoozed || 0) },
    { key: 'snoozed', label: t('perception.filter.snoozed'), count: counts.snoozed || 0 },
    { key: 'auto_resolved', label: t('perception.filter.auto_resolved'), count: counts.auto_resolved || 0, icon: '&#129302;' },
    { key: 'dismissed', label: t('perception.filter.dismissed'), count: counts.dismissed || 0 },
    { key: 'all', label: t('perception.filter.all'), count: Object.values(counts).reduce((a, b) => a + b, 0) },
  ];
  html += '<div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">';
  for (const tab of tabs) {
    const active = perceptionFilter === tab.key;
    html += `<button class="btn-ghost btn-sm" style="${active ? 'background:var(--bg-active);color:var(--accent);border-color:var(--accent)' : ''}" onclick="perceptionFilter='${tab.key}';navigate({type:'perceptions'})">${tab.icon || ''} ${esc(tab.label)} (${tab.count})</button>`;
  }
  html += '</div>';

  if (items.length === 0) {
    html += `<div class="empty-state"><div class="icon">&#128065;</div><p>${t('perception.empty', { filter: perceptionFilter })}</p><p style="font-size:0.78rem;margin-top:8px">${t('perception.empty_hint')}</p></div>`;
    area.innerHTML = html;
    return;
  }

  // Group by signal_type
  const byType = {};
  for (const p of items) {
    const typeKey = p.signal_type || 'unknown';
    if (!byType[typeKey]) byType[typeKey] = [];
    byType[typeKey].push(p);
  }

  const typeOrder = ['guard', 'contradiction', 'pattern', 'resonance', 'staleness', 'related_decision', 'unknown'];
  const typeIcons = { guard: '&#9888;', contradiction: '&#9889;', pattern: '&#128257;', resonance: '&#128204;', staleness: '&#9203;', related_decision: '&#128205;', unknown: '&#10067;' };
  const typeColors = { guard: 'var(--red)', contradiction: 'var(--orange)', pattern: 'var(--blue)', resonance: 'var(--purple)', staleness: 'var(--yellow)', related_decision: 'var(--cyan)', unknown: 'var(--text-muted)' };

  for (const type of typeOrder) {
    const list = byType[type];
    if (!list || list.length === 0) continue;
    const typeLabel = t('perception.type.' + type);
    html += `<div class="section-gap">
      <div class="section-title" style="color:${typeColors[type]};display:flex;align-items:center;gap:6px">
        <span>${typeIcons[type]}</span> ${esc(typeLabel)} · ${list.length}
      </div>`;
    for (const p of list) {
      html += renderPerceptionCard(p, typeColors[type]);
    }
    html += '</div>';
  }

  area.innerHTML = html;
}

function renderPerceptionCard(p, color) {
  const meta = p.metadata || {};
  const state = p.state || 'active';
  const expCap = p.exposure_count >= 3;
  const isResolved = state === 'auto_resolved';
  const isDismissed = state === 'dismissed';
  const isSnoozed = state === 'snoozed';

  const badges = [];
  if (state === 'active' && !expCap) badges.push(`<span class="badge badge-cat" style="background:rgba(59,130,246,0.12);color:var(--accent)">${t('perception.state.active')}</span>`);
  if (expCap) badges.push(`<span class="badge badge-cat" style="background:rgba(148,163,184,0.15);color:var(--text-muted)">${t('perception.state.hidden')}</span>`);
  if (isSnoozed) badges.push(`<span class="badge badge-cat" style="background:rgba(234,179,8,0.12);color:var(--yellow)">${t('perception.state.snoozed')}</span>`);
  if (isResolved) badges.push(`<span class="badge badge-cat" style="background:rgba(34,197,94,0.12);color:var(--green)">${t('perception.state.auto_resolved')}</span>`);
  if (isDismissed) badges.push(`<span class="badge badge-cat" style="background:rgba(100,116,139,0.15);color:var(--text-muted)">${t('perception.state.dismissed')}</span>`);

  const firstSeen = p.first_seen_at ? formatDate(p.first_seen_at) : '';
  const lastSeen = p.last_seen_at ? formatDate(p.last_seen_at) : '';

  let html = `<div class="card-box" style="margin-bottom:10px;padding:14px;border-left:3px solid ${color}">`;
  html += `<div style="font-weight:600;font-size:0.92rem;margin-bottom:6px">${esc(p.title || p.signal_id)}</div>`;
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${badges.join('')}</div>`;

  // Exposure / weight bar
  if (p.exposure_count != null) {
    const weightPct = Math.round((p.current_weight || 0) * 100);
    html += `<div style="display:flex;gap:12px;font-size:0.76rem;color:var(--text-muted);margin-bottom:10px">
      <span>${t('perception.shown', { n: p.exposure_count })}</span>
      <span>${t('perception.weight', { pct: weightPct })}</span>
      ${firstSeen ? `<span>${t('perception.first', { when: firstSeen })}</span>` : ''}
      ${lastSeen ? `<span>${t('perception.last', { when: lastSeen })}</span>` : ''}
    </div>`;
  }

  // Resolution info for auto-resolved
  if (isResolved && p.resolution_reason) {
    html += `<div style="background:rgba(34,197,94,0.08);border-left:2px solid var(--green);padding:8px 12px;border-radius:var(--radius-sm);font-size:0.82rem;margin-bottom:10px">
      <div style="font-weight:600;color:var(--green);margin-bottom:2px">${t('perception.llm_resolved')}</div>
      <div style="color:var(--text-secondary)">${esc(p.resolution_reason)}</div>
      ${p.resolved_by_memory_id ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">${t('perception.triggered_by')} <a onclick="navigate({type:'memory',id:'${esc(p.resolved_by_memory_id)}'})" style="color:var(--accent);cursor:pointer">${esc(p.resolved_by_memory_id)}</a></div>` : ''}
    </div>`;
  }

  // Snooze info
  if (isSnoozed && p.snoozed_until) {
    html += `<div style="font-size:0.76rem;color:var(--text-muted);margin-bottom:10px">${t('perception.snoozed_until', { when: formatDate(p.snoozed_until) })}</div>`;
  }

  // Actions
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  if (state === 'active' || state === 'snoozed') {
    if (!isSnoozed) {
      html += `<button class="btn-ghost btn-sm" onclick="perceptionAck('${esc(p.signal_id)}')">${t('perception.action.snooze')}</button>`;
    }
    html += `<button class="btn-ghost btn-sm" onclick="perceptionDismiss('${esc(p.signal_id)}')">${t('perception.action.dismiss')}</button>`;
  }
  if (isResolved || isDismissed) {
    html += `<button class="btn-ghost btn-sm" onclick="perceptionRestore('${esc(p.signal_id)}')">${t('perception.action.restore')}</button>`;
  }
  if (p.source_card_id) {
    html += `<button class="btn-ghost btn-sm" onclick="navigate({type:'card',id:'${esc(p.source_card_id)}'})">${t('perception.action.jump')}</button>`;
  }
  html += '</div>';

  html += '</div>';
  return html;
}

async function perceptionAck(signalId) {
  await api(`/perceptions/${encodeURIComponent(signalId)}/acknowledge`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ snooze_days: 7 }),
  });
  await loadSidebarData();
}

async function perceptionDismiss(signalId) {
  await api(`/perceptions/${encodeURIComponent(signalId)}/dismiss`, { method: 'POST' });
  await loadSidebarData();
}

async function perceptionRestore(signalId) {
  await api(`/perceptions/${encodeURIComponent(signalId)}/restore`, { method: 'POST' });
  await loadSidebarData();
}

async function refreshPerceptions() {
  await api('/perceptions/refresh', { method: 'POST' });
  await loadSidebarData();
}

// ── Skills View ──
function renderSkillsView(area) {
  const active = sidebarData.skills.filter(s => s.status === 'active');
  const archived = sidebarData.skills.filter(s => s.status === 'archived');

  let html = '<h2 style="font-size:1.1rem;margin-bottom:16px">&#9889; Skills</h2>';

  if (active.length === 0 && archived.length === 0) {
    html += '<div class="empty-state"><div class="icon">&#9889;</div><p>No skills extracted yet. Skills are automatically extracted from repeated patterns in your knowledge cards.</p></div>';
    area.innerHTML = html; return;
  }

  if (active.length > 0) {
    html += '<div class="grid-2" style="margin-bottom:24px">';
    for (const s of active) { html += renderSkillCard(s); }
    html += '</div>';
  }

  if (archived.length > 0) {
    html += '<details style="margin-top:16px"><summary style="cursor:pointer;color:var(--text-muted);font-size:0.82rem">Archived Skills (' + archived.length + ')</summary>';
    html += '<div class="grid-2" style="margin-top:12px">';
    for (const s of archived) { html += renderSkillCard(s); }
    html += '</div></details>';
  }

  area.innerHTML = html;
}

function renderSkillCard(s) {
  const decay = s.decay_score != null ? s.decay_score : 1.0;
  const decayPct = Math.round(decay * 100);
  const decayColor = decay > 0.7 ? 'var(--green)' : decay > 0.4 ? 'var(--yellow)' : 'var(--red)';
  const pinned = s.pinned ? 1 : 0;
  const methods = Array.isArray(s.methods) ? s.methods : [];
  const tags = Array.isArray(s.tags) ? s.tags : [];

  return `<div class="card-box skill-card">
    <span class="skill-pin${pinned?' pinned':''}" onclick="toggleSkillPin('${esc(s.id)}',${pinned?0:1})" title="${pinned?'Unpin':'Pin'}">${pinned?'&#128204;':'&#128205;'}</span>
    <div class="skill-card-name">${esc(s.name || 'Untitled')}</div>
    <div class="skill-card-summary">${esc(s.summary || '')}</div>
    <div class="skill-decay-bar"><div class="skill-decay-fill" style="width:${decayPct}%;background:${decayColor}"></div></div>
    <div class="skill-meta">
      <span>Decay: ${decayPct}%</span>
      <span>Used: ${s.usage_count || 0}x</span>
      ${s.last_used_at ? `<span>Last: ${formatDate(s.last_used_at)}</span>` : ''}
    </div>
    ${methods.length > 0 ? `<div style="margin-top:8px;font-size:0.78rem;color:var(--text-muted)"><strong>Steps:</strong><ol style="margin:4px 0 0 16px">${methods.map(m=>`<li>${esc(m)}</li>`).join('')}</ol></div>` : ''}
    ${tags.length > 0 ? `<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">${tags.map(t=>`<span class="badge badge-tag">${esc(t)}</span>`).join('')}</div>` : ''}
  </div>`;
}

async function toggleSkillPin(skillId, pinned) {
  await api('/skills/' + encodeURIComponent(skillId), {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pinned: !!pinned })
  });
  loadSidebarData();
}

// ── Memories (Data tab) ──
let memOffset = 0;
const MEM_PAGE_SIZE = 50;

async function loadMemories() {
  memOffset = 0;
  const container = document.getElementById('memory-list');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await api(`/memories?limit=${MEM_PAGE_SIZE}&offset=0`);
  if (!data) { container.innerHTML = '<div class="empty-state"><p>Could not load memories.</p></div>'; return; }
  const items = data.items || [];
  renderMemories(items, container);
  memOffset = items.length;
  // Stats
  const statsEl = document.getElementById('mem-stats');
  if (statsEl) statsEl.textContent = t('memories.showing', { shown: items.length, total: data.total ?? '?' });
  // Load more
  const moreBtn = document.getElementById('mem-load-more');
  if (moreBtn) moreBtn.style.display = items.length < (data.total || 0) ? 'block' : 'none';
  memoriesLoaded = true;
}

async function loadMoreMemories() {
  const container = document.getElementById('memory-list');
  const data = await api(`/memories?limit=${MEM_PAGE_SIZE}&offset=${memOffset}`);
  if (!data?.items?.length) return;
  // Append to existing list
  const items = data.items;
  for (const m of items) {
    container.insertAdjacentHTML('beforeend', renderMemoryItem(m));
  }
  memOffset += items.length;
  const statsEl = document.getElementById('mem-stats');
  if (statsEl) statsEl.textContent = t('memories.showing', { shown: memOffset, total: data.total ?? '?' });
  const moreBtn = document.getElementById('mem-load-more');
  if (moreBtn) moreBtn.style.display = memOffset < (data.total || 0) ? 'block' : 'none';
}

async function searchMemories() {
  const q = document.getElementById('memory-search').value.trim();
  if (!q) { loadMemories(); return; }
  const container = document.getElementById('memory-list');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await api('/search?q=' + encodeURIComponent(q) + '&limit=30');
  if (!data) { container.innerHTML = '<div class="empty-state"><p>Search failed.</p></div>'; return; }
  document.getElementById('mem-load-more').style.display = 'none';
  renderMemories(data.items || [], container);
}

function renderMemoryItem(m) {
  const raw = m.content || m.fts_content || m.summary || '';
  let title = m.title;
  if (!title || title === 'null') {
    const firstLine = raw.split('\n').find(l => l.trim()) || '';
    title = firstLine.length > 100 ? firstLine.substring(0, 97) + '...' : firstLine;
  }
  title = title || 'Untitled';
  const tags = parseTags(m.tags).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('');
  const typeLabel = m.type || m.category || 'memory';
  const sourceLabel = m.source ? `<span class="badge badge-tag" style="border-color:var(--accent);color:var(--accent)">${esc(m.source)}</span>` : '';

  return `<div class="card-box" style="margin-bottom:8px;cursor:pointer;padding:14px;border-left:3px solid ${typeLabel === 'session_summary' ? 'var(--accent)' : typeLabel === 'code_change' ? 'var(--orange)' : typeLabel === 'turn_summary' ? 'var(--green)' : 'var(--border)'}" onclick="this.querySelector('.mem-body').style.display=this.querySelector('.mem-body').style.display==='block'?'none':'block'">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge badge-cat">${esc(typeLabel)}</span>
      ${sourceLabel}
      <span style="font-weight:500;font-size:0.85rem;flex:1;min-width:0">${esc(title)}</span>
      <span style="font-size:0.76rem;color:var(--text-muted);white-space:nowrap">${formatDate(m.created_at)}</span>
    </div>
    ${tags ? `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">${tags}</div>` : ''}
    <div class="mem-body card-detail-body" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:0.82rem">${renderMd(raw)}</div>
  </div>`;
}

function renderMemories(items, container) {
  if (items.length === 0) { container.innerHTML = '<div class="empty-state"><div class="icon">&#128466;</div><p>No memories found.</p></div>'; return; }
  container.innerHTML = items.map(renderMemoryItem).join('');
}

document.getElementById('memory-search').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchMemories(); });

// ── Sync Panel ──
async function renderSyncPanel() {
  const container = document.getElementById('sync-panel-inner');
  const [data, recent] = await Promise.all([api('/sync/status'), api('/sync/recent')]);

  let html = `<h2 style="font-size:1.1rem;margin-bottom:20px">&#9729; ${t('sync.title')}</h2>`;

  // Connection status card
  html += '<div class="sync-status-box" style="border-radius:var(--radius)">';
  if (data && data.cloud_enabled) {
    html += '<div class="sync-icon connected" style="font-size:1.4rem">&#9889;</div>';
    html += `<div class="sync-info" style="flex:1"><h3 style="color:var(--green)">${t('sync.connected')}</h3><p>${t('sync.memory_label')} <strong>${esc(data.memory_name || data.memory_id?.substring(0, 12) || 'N/A')}</strong></p>`;
    if (data.last_push_at) html += `<p style="font-size:0.78rem;margin-top:2px">${t('sync.last_sync', { when: formatDate(data.last_push_at) })}</p>`;
    html += '</div>';
    html += `<button class="btn-ghost btn-sm" onclick="disconnectCloud()">${t('sync.disconnect')}</button>`;
  } else {
    html += '<div class="sync-icon disconnected" style="font-size:1.4rem">&#9729;</div>';
    html += `<div class="sync-info" style="flex:1"><h3>${t('sync.not_connected')}</h3><p>${t('sync.connect_description')}</p></div>`;
    html += `<button class="btn" onclick="document.getElementById('connect-flow').classList.toggle('visible')">${t('sync.connect')}</button>`;
  }
  html += '</div>';

  // Auth flow (hidden by default)
  html += `<div class="connect-instructions" id="connect-flow">
    <div id="auth-flow">
      <p style="color:var(--text-secondary);margin-bottom:12px">One click to connect. No manual setup needed.</p>
      <button class="btn" style="width:100%" onclick="startDeviceAuth()">Start Connection</button>
    </div>
    <div id="auth-pending" style="display:none;text-align:center">
      <p style="color:var(--text-secondary)">Open this link and enter the code:</p>
      <div style="font-size:2em;font-weight:700;letter-spacing:4px;color:var(--accent);margin:12px 0" id="auth-code">---</div>
      <a id="auth-link" href="#" target="_blank" style="color:var(--accent-hover)">Loading...</a>
      <p style="color:var(--text-muted);margin-top:12px;font-size:0.82rem">Waiting... <span class="spinner" style="width:14px;height:14px;display:inline-block;vertical-align:middle"></span></p>
    </div>
    <div id="auth-select" style="display:none">
      <p style="color:var(--text-secondary);margin-bottom:8px">Select a memory:</p>
      <select id="auth-memory-select" style="width:100%;padding:8px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px"></select>
      <button class="btn" style="width:100%" onclick="confirmMemory()">Connect</button>
    </div>
    <div id="auth-done" style="display:none;text-align:center">
      <div style="font-size:2em;margin:8px 0;color:var(--green)">&#10003;</div>
      <p style="color:var(--green)">Connected! Sync will start automatically.</p>
    </div>
  </div>`;

  // Sync capabilities overview
  if (data?.cloud_enabled) {
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:20px 0">';
    html += syncCapCard(t('sync.cap.memories'), '&#128466;', true, t('sync.cap.push'));
    html += syncCapCard(t('sync.cap.cards'), '&#128218;', true, t('sync.cap.push_pull'));
    html += syncCapCard(t('sync.cap.tasks'), '&#9745;', true, t('sync.cap.push'));
    html += syncCapCard(t('sync.cap.risks'), '&#9888;', true, t('sync.cap.pull'));
    const skillsInfo = recent?.skills_sync;
    html += syncCapCard(t('sync.cap.skills'), '&#9889;', true, `${t('stats.skills_count', { n: skillsInfo?.local_count || 0 })} &middot; ${t('sync.cap.push_pull')}`);
    html += syncCapCard(t('sync.cap.topics'), '&#128209;', true, t('sync.cap.via_card'));
    html += '</div>';
  }

  // Recently synced content
  if (recent && data?.cloud_enabled) {
    html += '<div style="margin-top:24px">';

    // Pushed memories
    const pushedMem = recent.pushed_memories || [];
    if (pushedMem.length > 0) {
      html += `<div class="section-gap"><div class="section-title">${t('sync.recent_push_mem')}</div>`;
      for (const m of pushedMem) {
        html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:0.82rem">
          <span class="badge badge-cat">${esc(m.type || 'memory')}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.title || t('common.untitled'))}</span>
          <span style="color:var(--text-muted);font-size:0.75rem;white-space:nowrap">${formatDate(m.last_pushed_at)}</span>
        </div>`;
      }
      html += '</div>';
    }

    // Pushed cards
    const pushedCards = recent.pushed_cards || [];
    if (pushedCards.length > 0) {
      html += `<div class="section-gap"><div class="section-title">${t('sync.recent_push_cards')}</div>`;
      for (const c of pushedCards) {
        html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:0.82rem">

          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.title || t('common.untitled'))}</span>
          <span style="color:var(--text-muted);font-size:0.75rem;white-space:nowrap">${formatDate(c.last_pushed_at)}</span>
        </div>`;
      }
      html += '</div>';
    }

    // Pulled cards
    const pulledCards = recent.pulled_cards || [];
    if (pulledCards.length > 0) {
      html += `<div class="section-gap"><div class="section-title">${t('sync.recent_pull')}</div>`;
      for (const c of pulledCards) {
        const typeIcon = c.card_type === 'moc' ? '&#128209;' : '&#128218;';
        html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:0.82rem">
          <span>${typeIcon}</span>
          ${catBadge(c.category || 'insight')}
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.title || t('common.untitled'))}</span>
          <span style="color:var(--text-muted);font-size:0.75rem;white-space:nowrap">${formatDate(c.last_pulled_at)}</span>
        </div>`;
      }
      html += '</div>';
    }

    if (pushedMem.length === 0 && pushedCards.length === 0 && pulledCards.length === 0) {
      html += `<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.85rem">${t('sync.recent_empty')}</div>`;
    }

    html += '</div>';
  }

  // Sync event log (compact)
  if (data?.history?.length > 0) {
    html += `<details style="margin-top:20px"><summary style="cursor:pointer;font-size:0.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px">${t('sync.history', { n: data.history.length })}</summary>`;
    for (const item of data.history) {
      const dir = item.details?.direction || 'push';
      const icon = dir === 'pull' ? '&#11015;' : '&#11014;';
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:0.78rem;color:var(--text-muted);border-bottom:1px solid var(--border)">
        <span>${icon}</span>
        <span style="min-width:70px;font-weight:500;color:var(--text-secondary)">${esc(item.type||'memories')}</span>
        <span>${item.details?.count || 0} ${dir}</span>
        <span style="margin-left:auto;font-size:0.72rem">${formatDate(item.timestamp)}</span>
      </div>`;
    }
    html += '</details>';
  }

  container.innerHTML = html;
}

function syncCapCard(label, icon, supported, detail) {
  const borderColor = supported ? 'var(--green)' : 'var(--border)';
  const statusDot = supported ? '<span style="color:var(--green)">&#9679;</span>' : '<span style="color:var(--text-muted)">&#9675;</span>';
  return `<div class="card-box" style="padding:12px;border-left:3px solid ${borderColor}">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <span style="font-size:1rem">${icon}</span>
      <span style="font-weight:600;font-size:0.85rem">${esc(label)}</span>
      ${statusDot}
    </div>
    <div style="font-size:0.75rem;color:var(--text-muted)">${detail}</div>
  </div>`;
}

let _authApiKey = null;
async function startDeviceAuth() {
  document.getElementById('auth-flow').style.display = 'none';
  document.getElementById('auth-pending').style.display = 'block';
  try {
    const data = await api('/cloud/auth/start', { method: 'POST' });
    if (!data?.user_code) throw new Error('Failed to start auth');
    document.getElementById('auth-code').textContent = data.user_code;
    const link = document.getElementById('auth-link');
    link.href = data.verification_uri + '?code=' + data.user_code;
    link.textContent = data.verification_uri;
    api('/cloud/auth/open-browser', { method: 'POST', body: JSON.stringify({ url: link.href }) }).catch(() => window.open(link.href, '_blank'));
    const result = await api('/cloud/auth/poll', { method: 'POST', body: JSON.stringify({ device_code: data.device_code, interval: data.interval || 5 }) });
    if (result?.api_key) {
      _authApiKey = result.api_key;
      document.getElementById('auth-pending').style.display = 'none';
      document.getElementById('auth-select').style.display = 'block';
      const memories = await api('/cloud/memories?api_key=' + encodeURIComponent(result.api_key));
      const sel = document.getElementById('auth-memory-select');
      sel.innerHTML = '';
      (memories || []).forEach(m => { const o = document.createElement('option'); o.value = m.id; o.textContent = m.name || m.id; sel.appendChild(o); });
      if (!memories?.length) sel.innerHTML = '<option value="">No memories found</option>';
    }
  } catch (e) {
    document.getElementById('auth-pending').innerHTML = `<p style="color:var(--red)">${esc(e.message)}</p><button class="btn" style="margin-top:12px" onclick="startDeviceAuth()">Retry</button>`;
  }
}

async function confirmMemory() {
  const sel = document.getElementById('auth-memory-select');
  await api('/cloud/connect', { method: 'POST', body: JSON.stringify({ api_key: _authApiKey, memory_id: sel.value, memory_name: sel.options[sel.selectedIndex]?.textContent || sel.value }) });
  document.getElementById('auth-select').style.display = 'none';
  document.getElementById('auth-done').style.display = 'block';
  setTimeout(() => renderSyncPanel(), 2000);
}

async function disconnectCloud() {
  if (!confirm('Disconnect from cloud? Local memories will remain.')) return;
  await api('/cloud/disconnect', { method: 'POST' });
  renderSyncPanel();
}
